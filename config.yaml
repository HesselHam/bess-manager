name: "BESS Manager"
description: "Battery Energy Storage System optimization and management"
version: "7.9.64"
slug: "bess_manager"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ports:
  8080/tcp: 8080
ingress: true
ingress_port: 8080
panel_icon: mdi:battery-charging
panel_title: BESS Manager
panel_admin: true
hassio_api: true
homeassistant_api: true
auth_api: true
options:
  influxdb:
    url: "http://homeassistant.local:8086/api/v2/query"
    bucket: "homeassistant/autogen"
    username: "homeassistantinflux"
    password: "homeassistantinflux123"
  home:
    consumption: 3.5                # default hourly consumption in kWh
    currency: "EUR"                 # currency for price display and calculations
    consumption_strategy: "influxdb_7d_avg"  # "sensor" (HA 48h avg), "fixed", or "influxdb_7d_avg"
    history_days: 3                 # Number of past days to keep in decision history (default: 1 = yesterday + today)
    max_fuse_current: 25            # Maximum fuse current in amperes
    voltage: 230                    # Line voltage in volts
    safety_margin_factor: 0.95      # Safety margin for power calculations
    phase_count: 3                  # Number of electrical phases (1 for single-phase, 3 for three-phase)
    inverter_phase: "3"
  battery:
    total_capacity: 7.5              # kWh
    min_soc: 10                      # Minimum state of charge (%) - synced to inverter on startup
    max_soc: 100                     # Maximum state of charge (%) - synced to inverter on startup
    max_charge_discharge_power: 100  # kW
    cycle_cost: 0.045                # Battery wear cost per kWh (excl. VAT) - use your local currency
    min_action_profit_threshold: 0.1 # Minimum profit threshold for any battery action (in your currency)
    idle_deadband_pct: 2             # IDLE mode: max SOE deviation as % of usable capacity (default 2%)
    grid_charge_max_solar_threshold_kwh: 0.1  # Grid charge blocked when solar exceeds this per period (kWh)
    grid_charge_min_headroom_kwh: 0.9         # Minimum free battery space required for grid charge (kWh)
    idle_enabled: true                        # Include IDLE as a DP mode option (true) or exclude it (false)
    modbus_tou_control: false                 # Write TOU segments via local Modbus instead of Growatt cloud API (false = cloud API)
    modbus_tou_entity_prefix: ""             # SolaX Modbus entity prefix, e.g. "growatt_modbus_min3600tlxh"
    export_limit_enable_option: "Meter 1"    # Option to select on export_limit_entity to block export (Meter 1 / Meter 2 / CT Clamp)
    export_limit_simulation: true            # When true: DP and UI reflect export blocking, but inverter is not written
    export_look_ahead_guard: false           # Block EXPORT if next period has strictly higher sell price (simple heuristic)
    export_postprocess_reorder: false        # After DP: reassign EXPORT to highest-price periods in each sell window (robust fix)
    temperature_derating:
      enabled: false  # Enable for outdoor batteries affected by cold weather
      weather_entity: ""  # HA weather entity for forecast (e.g. "weather.forecast_home")
      # LFP derating curve: [temperature_celsius, charge_rate_percent]
      # Linear interpolation between points. Adjust for your battery chemistry.
      derating_curve:
        - [-1, 20]   # Below 0°C: heavily limited (battery heaters may allow some charging)
        - [0, 20]    # At 0°C: 20% charge rate
        - [5, 50]    # At 5°C: 50% charge rate
        - [10, 80]   # At 10°C: 80% charge rate
        - [15, 100]  # At 15°C+: full charge rate
  electricity_price:
    area: "SE4"                      # Area for Nordpool pricing
    markup_rate: 0.1116              # Electricity markup per kWh (in your currency)
    vat_multiplier: 1.21             # 21% VAT
    additional_costs: 0              # Additional costs per kWh in your currency (grid fees, energy tax, etc.)
    tax_reduction: 0.02              # Tax reduction for sold energy per kWh in your currency
  energy_provider:
    provider: "nordpool"  # "nordpool" (legacy sensor), "nordpool_official", or "octopus"
    nordpool:
      today_entity: "sensor.nordpool_kwh_nl_eur_3_10_0"
      tomorrow_entity: "sensor.nordpool_kwh_nl_eur_3_10_0"
    nordpool_official:
      config_entry_id: "01K3Y99FD3MDZYVFX2XSWR4888"
    octopus:
      import_today_entity: ""       # HA entity for today's Octopus import rates
      import_tomorrow_entity: ""    # HA entity for tomorrow's Octopus import rates
      export_today_entity: ""       # HA entity for today's Octopus export rates
      export_tomorrow_entity: ""    # HA entity for tomorrow's Octopus export rates
  growatt:
    device_id: "113ac8d5df0cc1d9adb83f922c0357cd"  # Growatt device ID for TOU segment operations
  sensors:
    # === Battery Control & Status ===
    battery_soc: "sensor.growatt_min_3600tl_xh_state_of_charge_soc"
    battery_charge_stop_soc: "number.growatt_min_3600tl_xh_battery_charge_soc_limit"
    battery_discharge_stop_soc: "number.growatt_min_3600tl_xh_battery_discharge_soc_limit_on_grid"
    battery_charging_power_rate: "number.growatt_min_3600tl_xh_battery_charge_power_limit"
    battery_discharging_power_rate: "number.growatt_min_3600tl_xh_battery_discharge_power_limit"
    grid_charge: "switch.growatt_min_3600tl_xh_charge_from_grid"
    bdc_switch: "select.growatt_modbus_min3600tlxh_inverter_switch"  # BDC switch for HOLD mode power saving (optional, Modbus only)
    export_limit_entity: ""                                          # Export limit select entity for blocking export at negative prices (optional, Modbus only)
    # === Real-time Power Sensors (Primary - Live Power Flow) ===
    pv_power: "sensor.growatt_min_3600tl_xh_internal_wattage"        # Total solar DC production
    local_load_power: "sensor.growatt_min_3600tl_xh_local_load_power"  # Home consumption
    import_power: "sensor.growatt_min_3600tl_xh_import_power"        # Grid import
    export_power: "sensor.growatt_min_3600tl_xh_export_power"        # Grid export
    battery_charge_power: "sensor.growatt_min_3600tl_xh_battery_1_charging_w"       # Battery charging power
    battery_discharge_power: "sensor.growatt_min_3600tl_xh_battery_1_discharging_w" # Battery discharging power
    # === Real-time Power Sensors (Advanced/Diagnostic - not required) ===
    output_power: "sensor.growatt_min_3600tl_xh_output_power"        # Output power
    self_power: "sensor.growatt_min_3600tl_xh_self_power"            # Solar contributing to AC loads
    system_power: "sensor.growatt_min_3600tl_xh_system_power"        # System power throughput
    # === Grid Current & Voltage Monitoring (not required) ===
    current_l1: "sensor.p1_meter_current_phase_1"                    # Phase 1 current
    current_l2: "sensor.p1_meter_current_phase_2"                    # Phase 2 current
    current_l3: "sensor.p1_meter_current_phase_3"                    # Phase 3 current
    voltage_l1: "sensor.p1_meter_voltage_phase_1"                    # Phase 1 voltage
    voltage_l2: "sensor.p1_meter_voltage_phase_2"                    # Phase 2 voltage
    voltage_l3: "sensor.p1_meter_voltage_phase_3"                    # Phase 3 voltage
    # === Lifetime Energy Totals ===
    lifetime_solar_energy: "sensor.growatt_min_3600tl_xh_lifetime_total_solar_energy"
    lifetime_load_consumption: "sensor.growatt_min_3600tl_xh_lifetime_total_load_consumption"
    lifetime_self_consumption: "sensor.growatt_min_3600tl_xh_lifetime_self_consumption"
    lifetime_import_from_grid: "sensor.p1_meter_energy_import"
    lifetime_export_to_grid: "sensor.p1_meter_energy_export"
    lifetime_battery_charged: "sensor.growatt_min_3600tl_xh_lifetime_total_battery_1_charged"
    lifetime_battery_discharged: "sensor.growatt_min_3600tl_xh_lifetime_total_battery_1_discharged"
    lifetime_system_production: "sensor.growatt_min_3600tl_xh_lifetime_system_production"
    ev_energy_meter: ""                                               # EV charging energy (lifetime)
    # === Solar & Consumption Forecasting ===
    48h_avg_grid_import: "sensor.48h_average_grid_import_power"       # 48h average consumption
    solar_forecast_today: "sensor.solcast_pv_forecast_forecast_today" # Today's solar forecast
    solar_forecast_tomorrow: "sensor.solcast_pv_forecast_forecast_tomorrow" # Tomorrow's solar forecast
schema:
  influxdb:
    url: str
    bucket: str
    username: str
    password: str
  home:
    consumption: float
    currency: str
    consumption_strategy: str
    history_days: int?
    max_fuse_current: int
    voltage: int
    safety_margin_factor: float
    phase_count: int
    inverter_phase: str?
  battery:
    total_capacity: float
    min_soc: float
    max_soc: float
    max_charge_discharge_power: float
    cycle_cost: float
    min_action_profit_threshold: float
    idle_deadband_pct: float?
    grid_charge_max_solar_threshold_kwh: float?
    grid_charge_min_headroom_kwh: float?
    idle_enabled: bool?
    modbus_tou_control: bool?
    modbus_tou_entity_prefix: str?
    export_limit_enable_option: str?
    export_limit_simulation: bool?
    export_look_ahead_guard: bool?
    export_postprocess_reorder: bool?
    temperature_derating:
      enabled: bool?
      weather_entity: str?
  electricity_price:
    area: str
    markup_rate: float
    vat_multiplier: float
    additional_costs: float
    tax_reduction: float
  energy_provider:
    provider: str
    nordpool:
      today_entity: str
      tomorrow_entity: str
    nordpool_official:
      config_entry_id: str
    octopus:
      import_today_entity: str
      import_tomorrow_entity: str
      export_today_entity: str
      export_tomorrow_entity: str
  growatt:
    device_id: str
  sensors:
    battery_soc: str
    battery_charge_power: str
    battery_discharge_power: str
    battery_charge_stop_soc: str
    battery_discharge_stop_soc: str
    battery_charging_power_rate: str
    battery_discharging_power_rate: str
    grid_charge: str
    bdc_switch: str?
    export_limit_entity: str?
    current_l1: str
    current_l2: str
    current_l3: str
    voltage_l1: str?
    voltage_l2: str?
    voltage_l3: str?
    lifetime_battery_charged: str
    lifetime_battery_discharged: str
    lifetime_solar_energy: str
    lifetime_export_to_grid: str
    lifetime_load_consumption: str
    lifetime_import_from_grid: str
    lifetime_system_production: str
    lifetime_self_consumption: str
    ev_energy_meter: str
    48h_avg_grid_import: str
    solar_forecast_today: str
    solar_forecast_tomorrow: str?
    pv_power: str
    local_load_power: str
    import_power: str
    export_power: str
    output_power: str
    self_power: str
    system_power: str
